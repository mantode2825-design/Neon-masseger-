<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Messenger</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --sidebar: #111118;
    --chat-bg: #0d0d14;
    --purple: #9b5de5;
    --cyan: #00f5d4;
    --purple-dim: rgba(155,93,229,0.25);
    --msg-other: #1a1a2e;
    --text: #e8e8f0;
    --text-dim: #888899;
    --border: rgba(155,93,229,0.2);
    --glow: 0 0 10px #9b5de5;
    --glow-cyan: 0 0 10px #00f5d4;
    --radius: 12px;
    --transition: all 0.2s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 2px; }

  /* ===== SIDEBAR ===== */
  #sidebar {
    width: 320px;
    min-width: 320px;
    background: var(--sidebar);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
    z-index: 10;
    transition: transform 0.3s ease;
  }

  #sidebar-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    background: rgba(155,93,229,0.05);
  }

  #logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  #logo-icon {
    width: 36px;
    height: 36px;
    background: linear-gradient(135deg, var(--purple), var(--cyan));
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: var(--glow);
    flex-shrink: 0;
  }

  #logo-text {
    font-size: 17px;
    font-weight: 700;
    background: linear-gradient(135deg, var(--purple), var(--cyan));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.5px;
  }

  #user-info {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  #user-name-display {
    font-size: 14px;
    font-weight: 600;
    flex: 1;
  }

  #online-dot {
    width: 8px;
    height: 8px;
    background: #00e676;
    border-radius: 50%;
    box-shadow: 0 0 6px #00e676;
    flex-shrink: 0;
  }

  #search-bar {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }

  #search-input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    outline: none;
    transition: var(--transition);
  }

  #search-input:focus {
    border-color: var(--purple);
    box-shadow: 0 0 8px rgba(155,93,229,0.3);
  }

  #search-input::placeholder { color: var(--text-dim); }

  #new-room-btn {
    margin: 10px 16px;
    background: linear-gradient(135deg, var(--purple), #7b3fd4);
    border: none;
    border-radius: 8px;
    padding: 9px 14px;
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: var(--transition);
    box-shadow: 0 2px 12px rgba(155,93,229,0.3);
  }

  #new-room-btn:hover {
    box-shadow: var(--glow), 0 4px 20px rgba(155,93,229,0.4);
    transform: translateY(-1px);
  }

  #rooms-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }

  .room-item {
    padding: 12px 16px;
    cursor: pointer;
    transition: var(--transition);
    border-left: 3px solid transparent;
    display: flex;
    align-items: center;
    gap: 12px;
    position: relative;
  }

  .room-item:hover {
    background: rgba(155,93,229,0.08);
  }

  .room-item.active {
    background: rgba(155,93,229,0.12);
    border-left-color: var(--purple);
    box-shadow: inset 0 0 20px rgba(155,93,229,0.05);
  }

  .room-icon {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(155,93,229,0.3), rgba(0,245,212,0.2));
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .room-info { flex: 1; min-width: 0; }

  .room-name {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 3px;
  }

  .room-preview {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .room-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
  }

  .room-time {
    font-size: 11px;
    color: var(--text-dim);
  }

  .unread-badge {
    background: var(--purple);
    color: #fff;
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 11px;
    font-weight: 700;
    box-shadow: 0 0 6px rgba(155,93,229,0.5);
    min-width: 18px;
    text-align: center;
  }

  /* ===== MAIN CHAT ===== */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* Empty state */
  #empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  #empty-state svg { opacity: 0.4; }

  #empty-state p {
    color: var(--text-dim);
    font-size: 15px;
    text-align: center;
  }

  #empty-state h3 {
    color: var(--text);
    font-size: 20px;
    font-weight: 600;
  }

  /* Chat area */
  #chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    display: none;
  }

  #chat-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(17,17,24,0.9);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  #hamburger {
    display: none;
    background: none;
    border: none;
    color: var(--text);
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
  }

  #chat-room-icon {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: linear-gradient(135deg, rgba(155,93,229,0.4), rgba(0,245,212,0.3));
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  #chat-room-info { flex: 1; }

  #chat-room-name {
    font-size: 15px;
    font-weight: 700;
  }

  #chat-room-members {
    font-size: 12px;
    color: var(--cyan);
  }

  #members-btn {
    background: rgba(155,93,229,0.15);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 12px;
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    transition: var(--transition);
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Inter', sans-serif;
  }

  #members-btn:hover {
    background: rgba(155,93,229,0.25);
    box-shadow: var(--glow);
  }

  /* Messages */
  #messages-wrapper {
    flex: 1;
    overflow-y: auto;
    position: relative;
    background: var(--chat-bg);
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(155,93,229,0.03) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(0,245,212,0.03) 0%, transparent 60%);
  }

  #messages-container {
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    min-height: 100%;
  }

  .date-separator {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 12px 0;
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 500;
  }

  .date-separator::before,
  .date-separator::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .date-label {
    background: rgba(155,93,229,0.15);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px 12px;
    white-space: nowrap;
  }

  /* Message bubble */
  .msg-wrapper {
    display: flex;
    flex-direction: column;
    max-width: 72%;
    position: relative;
    margin: 2px 0;
  }

  .msg-wrapper.own { align-self: flex-end; }
  .msg-wrapper.other { align-self: flex-start; }

  .msg-sender-info {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 4px;
  }

  .msg-sender-name {
    font-size: 12px;
    font-weight: 600;
  }

  .msg-bubble {
    padding: 9px 13px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.5;
    position: relative;
    word-break: break-word;
    transition: var(--transition);
  }

  .msg-wrapper.own .msg-bubble {
    background: var(--purple-dim);
    border: 1px solid rgba(155,93,229,0.4);
    border-left: 3px solid var(--purple);
    border-radius: 14px 4px 14px 14px;
    box-shadow: 0 2px 8px rgba(155,93,229,0.15);
  }

  .msg-wrapper.other .msg-bubble {
    background: var(--msg-other);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 4px 14px 14px 14px;
  }

  .msg-bubble.deleted {
    opacity: 0.5;
    font-style: italic;
    color: var(--text-dim);
    font-size: 13px;
  }

  .msg-footer {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 4px;
    justify-content: flex-end;
  }

  .msg-time {
    font-size: 11px;
    color: var(--text-dim);
  }

  .msg-tick { font-size: 12px; color: var(--text-dim); }
  .msg-tick.seen { color: var(--cyan); }

  /* Reply quote */
  .reply-quote {
    background: rgba(255,255,255,0.05);
    border-left: 3px solid var(--cyan);
    border-radius: 6px;
    padding: 6px 10px;
    margin-bottom: 6px;
    font-size: 12px;
  }

  .reply-quote-name {
    color: var(--cyan);
    font-weight: 600;
    margin-bottom: 2px;
  }

  .reply-quote-text {
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Reactions */
  .msg-reactions {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 5px;
  }

  .reaction-chip {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 2px 7px;
    font-size: 13px;
    cursor: pointer;
    transition: var(--transition);
    display: flex;
    align-items: center;
    gap: 3px;
    user-select: none;
  }

  .reaction-chip:hover {
    background: rgba(155,93,229,0.2);
    border-color: var(--purple);
  }

  .reaction-chip.reacted {
    background: rgba(155,93,229,0.25);
    border-color: var(--purple);
    box-shadow: 0 0 6px rgba(155,93,229,0.3);
  }

  .reaction-count { font-size: 11px; color: var(--text-dim); }

  /* Hover action bar */
  .msg-actions {
    position: absolute;
    top: -32px;
    display: none;
    background: #1e1e2e;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 8px;
    gap: 4px;
    align-items: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5), var(--glow);
    z-index: 10;
    white-space: nowrap;
  }

  .msg-wrapper.own .msg-actions { right: 0; }
  .msg-wrapper.other .msg-actions { left: 0; }

  .msg-wrapper:hover .msg-actions { display: flex; }

  .action-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 15px;
    padding: 4px 6px;
    border-radius: 8px;
    transition: var(--transition);
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 4px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
  }

  .action-btn:hover {
    background: rgba(155,93,229,0.2);
    color: var(--purple);
  }

  .action-btn.delete:hover {
    background: rgba(255,50,50,0.2);
    color: #ff5555;
  }

  /* Typing indicator */
  #typing-indicator {
    padding: 8px 16px;
    font-size: 12px;
    color: var(--cyan);
    min-height: 28px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .typing-dots {
    display: flex;
    gap: 3px;
    align-items: center;
  }

  .typing-dot {
    width: 5px;
    height: 5px;
    background: var(--cyan);
    border-radius: 50%;
    animation: typingBounce 1.2s infinite;
  }

  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
    30% { transform: translateY(-4px); opacity: 1; }
  }

  /* Input area */
  #input-area {
    padding: 10px 16px 14px;
    border-top: 1px solid var(--border);
    background: var(--sidebar);
    flex-shrink: 0;
  }

  #reply-preview {
    background: rgba(0,245,212,0.08);
    border: 1px solid rgba(0,245,212,0.2);
    border-radius: 8px;
    padding: 8px 12px;
    margin-bottom: 8px;
    display: none;
    align-items: center;
    gap: 10px;
  }

  #reply-preview-content { flex: 1; min-width: 0; }

  #reply-preview-name {
    font-size: 12px;
    color: var(--cyan);
    font-weight: 600;
    margin-bottom: 2px;
  }

  #reply-preview-text {
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #reply-cancel {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 16px;
    padding: 2px;
    border-radius: 4px;
    transition: var(--transition);
    flex-shrink: 0;
    line-height: 1;
  }

  #reply-cancel:hover { color: #ff5555; }

  #input-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
  }

  #emoji-btn {
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    padding: 6px;
    border-radius: 8px;
    transition: var(--transition);
    flex-shrink: 0;
    line-height: 1;
    filter: grayscale(0.3);
  }

  #emoji-btn:hover {
    background: rgba(155,93,229,0.15);
    filter: grayscale(0);
    transform: scale(1.1);
  }

  #msg-input {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
    resize: none;
    line-height: 1.5;
    min-height: 42px;
    max-height: 100px;
    overflow-y: auto;
    transition: var(--transition);
  }

  #msg-input:focus {
    border-color: var(--purple);
    box-shadow: 0 0 8px rgba(155,93,229,0.25);
  }

  #msg-input::placeholder { color: var(--text-dim); }

  #send-btn {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--purple), #7b3fd4);
    border: none;
    color: #fff;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
    flex-shrink: 0;
    box-shadow: 0 2px 10px rgba(155,93,229,0.4);
  }

  #send-btn:hover {
    box-shadow: var(--glow), 0 4px 20px rgba(155,93,229,0.5);
    transform: scale(1.08);
  }

  /* Emoji picker */
  #emoji-picker {
    position: absolute;
    bottom: 80px;
    left: 16px;
    width: 320px;
    background: #1a1a2e;
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6), var(--glow);
    z-index: 100;
    overflow: hidden;
    display: none;
    animation: popIn 0.2s ease;
  }

  @keyframes popIn {
    from { transform: scale(0.9) translateY(10px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }

  #emoji-picker-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    padding: 6px 8px 0;
    gap: 2px;
    overflow-x: auto;
  }

  .emoji-tab {
    background: none;
    border: none;
    font-size: 18px;
    padding: 6px 8px;
    cursor: pointer;
    border-radius: 8px 8px 0 0;
    border-bottom: 2px solid transparent;
    transition: var(--transition);
    flex-shrink: 0;
  }

  .emoji-tab.active {
    border-bottom-color: var(--purple);
    background: rgba(155,93,229,0.15);
  }

  .emoji-tab:hover { background: rgba(155,93,229,0.1); }

  #emoji-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 2px;
    padding: 10px;
    max-height: 200px;
    overflow-y: auto;
  }

  .emoji-item {
    font-size: 20px;
    padding: 5px;
    cursor: pointer;
    border-radius: 6px;
    text-align: center;
    transition: var(--transition);
    line-height: 1;
  }

  .emoji-item:hover {
    background: rgba(155,93,229,0.2);
    transform: scale(1.2);
  }

  /* Reaction emoji picker */
  #reaction-picker {
    position: fixed;
    background: #1a1a2e;
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 6px 10px;
    display: none;
    gap: 4px;
    z-index: 200;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6), var(--glow);
    animation: popIn 0.15s ease;
  }

  .quick-reaction {
    font-size: 20px;
    cursor: pointer;
    padding: 4px;
    border-radius: 8px;
    transition: var(--transition);
    line-height: 1;
  }

  .quick-reaction:hover { transform: scale(1.3); background: rgba(155,93,229,0.2); }

  /* New messages button */
  #new-msg-btn {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--purple);
    color: #fff;
    border: none;
    border-radius: 20px;
    padding: 8px 16px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: none;
    box-shadow: var(--glow);
    animation: popIn 0.2s ease;
    z-index: 5;
  }

  #new-msg-btn:hover { box-shadow: var(--glow), 0 4px 20px rgba(155,93,229,0.5); }

  /* Members drawer */
  #members-drawer {
    position: fixed;
    top: 0;
    right: -280px;
    width: 280px;
    height: 100vh;
    background: #15151f;
    border-left: 1px solid var(--border);
    z-index: 50;
    transition: right 0.3s ease;
    display: flex;
    flex-direction: column;
    box-shadow: -4px 0 30px rgba(0,0,0,0.5);
  }

  #members-drawer.open { right: 0; }

  #members-drawer-header {
    padding: 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(155,93,229,0.05);
  }

  #members-drawer-header h3 {
    font-size: 15px;
    font-weight: 700;
    color: var(--purple);
  }

  #close-drawer {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    border-radius: 6px;
    transition: var(--transition);
  }

  #close-drawer:hover { color: var(--text); background: rgba(255,255,255,0.05); }

  #members-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
  }

  .member-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-radius: 10px;
    transition: var(--transition);
    margin-bottom: 2px;
  }

// ==================== STATE ====================
let currentUser = null; // { uid, name, color }
let currentRoomId = null;

let allRooms = {}; // roomId -> room data

// ==================== INIT ====================
window.addEventListener('load', () => {
  auth.signInAnonymously().then(result => {
    const uid = result.user.uid;
    const storedName = localStorage.getItem('nm_name');
    const storedColor = localStorage.getItem('nm_color');

    if (storedName && storedColor) {
      currentUser = { uid, name: storedName, color: storedColor };
      finishInit();
    } else {
      hideLoader();
      showOnboardingModal(uid);

  }).catch(err => {
    hideLoader();
    showToast('Connection error: ' + err.message);
  });
});

function hideLoader() {
  const loader = document.getElementById('app-loader');
  loader.style.opacity = '0';
  loader.style.transition = 'opacity 0.4s';
  setTimeout(() => loader.remove(), 400);
}

function finishInit() {
  hideLoader();
  setupUserPresence();
  setupUI();
  listenToRooms();
  listenToAllUsers();
}

// ==================== PRESENCE ====================
function setupUserPresence() {
  const uid = currentUser.uid;
  const userRef = db.ref(`users/${uid}`);

  userRef.set({
    name: currentUser.name,
    color: currentUser.color,
    online: true,
    lastSeen: firebase.database.ServerValue.TIMESTAMP
  });

  userRef.onDisconnect().update({
    online: false,
    lastSeen: firebase.database.ServerValue.TIMESTAMP
  });
}

// ==================== UI SETUP ====================
function setupUI() {
  // My avatar
  const myAvatar = document.getElementById('my-avatar');
  myAvatar.style.background = currentUser.color;
  myAvatar.textContent = getInitials(currentUser.name);
  myAvatar.style.boxShadow = `0 0 8px ${currentUser.color}`;
  document.getElementById('user-name-display').textContent = currentUser.name;

  // New room btn
  document.getElementById('new-room-btn').addEventListener('click', showNewRoomModal);

  // Search
  document.getElementById('search-input').addEventListener('input', filterRooms);

  // Hamburger
  document.getElementById('hamburger').addEventListener('click', () => {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('sidebar-overlay').classList.add('visible');
  });

  document.getElementById('sidebar-overlay').addEventListener('click', closeSidebar);

  // Members btn
  document.getElementById('members-btn').addEventListener('click', () => {
    document.getElementById('members-drawer').classList.add('open');
  });

  document.getElementById('close-drawer').addEventListener('click', () => {
    document.getElementById('members-drawer').classList.remove('open');
  });

  // Send button
  document.getElementById('send-btn').addEventListener('click', sendMessage);

  // Textarea
  const input = document.getElementById('msg-input');
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  input.addEventListener('input', () => {
    autoResizeTextarea(input);
    fireTyping();
  });

  // Reply cancel
  document.getElementById('reply-cancel').addEventListener('click', clearReply);

  // Emoji button
  document.getElementById('emoji-btn').addEventListener('click', toggleEmojiPicker);

  // New messages button
  document.getElementById('new-msg-btn').addEventListener('click', scrollToBottom);

  // Messages scroll
  document.getElementById('messages-wrapper').addEventListener('scroll', onMessagesScroll);

  // Setup emoji picker
  setupEmojiPicker();

  // Close emoji picker on outside click
  document.addEventListener('click', e => {
    const picker = document.getElementById('emoji-picker');
    const btn = document.getElementById('emoji-btn');
    if (!picker.contains(e.target) && e.target !== btn) {
      picker.style.display = 'none';
    }
    const rp = document.getElementById('reaction-picker');
    if (!rp.contains(e.target)) {
      rp.style.display = 'none';
    }
  });

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('visible');
}

function autoResizeTextarea(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// ==================== EMOJI PICKER ====================
function setupEmojiPicker() {
  const tabsEl = document.getElementById('emoji-picker-tabs');
  const gridEl = document.getElementById('emoji-grid');
  const categories = Object.keys(EMOJI_CATEGORIES);

  categories.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'emoji-tab' + (i === 0 ? ' active' : '');
    btn.textContent = cat;
    btn.title = cat;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.emoji-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderEmojiGrid(cat);
    });
    tabsEl.appendChild(btn);
  });

  renderEmojiGrid(categories[0]);
}

function renderEmojiGrid(category) {
  const gridEl = document.getElementById('emoji-grid');
  gridEl.innerHTML = '';
  EMOJI_CATEGORIES[category].forEach(emoji => {
    const span = document.createElement('span');
    span.className = 'emoji-item';
    span.textContent = emoji;
    span.addEventListener('click', () => {
      const input = document.getElementById('msg-input');
      const pos = input.selectionStart;
      const before = input.value.substring(0, pos);
      const after = input.value.substring(input.selectionEnd);
      input.value = before + emoji + after;
      input.selectionStart = input.selectionEnd = pos + emoji.length;
      input.focus();
      autoResizeTextarea(input);
    });
    gridEl.appendChild(span);
  });
}

function toggleEmojiPicker() {
  const picker = document.getElementById('emoji-picker');
  picker.style.display = picker.style.display === 'block' ? 'none' : 'block';
}

// ==================== ROOMS ====================
function listenToRooms() {
  db.ref('rooms').on('value', snap => {
    allRooms = snap.val() || {};
    // Listen for last messages
    Object.keys(allRooms).forEach(roomId => {
      if (!messageListeners['last_' + roomId]) {
        messageListeners['last_' + roomId] = true;
        db.ref(`messages/${roomId}`).limitToLast(1).on('value', msgSnap => {
          let lastMsg = null;
          msgSnap.forEach(m => { lastMsg = m.val(); });
          if (lastMsg) {
            roomLastMessages[roomId] = {
              text: lastMsg.deleted ? 'This message was deleted' : lastMsg.text,
              time: lastMsg.timestamp
            };
          }
          renderRoomsList();
        });
      }
    });
    renderRoomsList();
  });
}

function renderRoomsList() {
  const listEl = document.getElementById('rooms-list');
  const search = document.getElementById('search-input').value.toLowerCase();

  const rooms = Object.entries(allRooms)
    .filter(([id, room]) => room.name.toLowerCase().includes(search))
    .sort((a, b) => {
      const ta = roomLastMessages[a[0]]?.time || a[1].createdAt || 0;
      const tb = roomLastMessages[b[0]]?.time || b[1].createdAt || 0;
      return tb - ta;
    });

  if (rooms.length === 0) {
    listEl.innerHTML = `<div class="empty-rooms">
      <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
        <rect x="8" y="12" width="32" height="24" rx="4" stroke="#9b5de5" stroke-width="2"/>
        <path d="M16 20h16M16 26h10" stroke="#9b5de5" stroke-width="2" stroke-linecap="round"/>
      </svg>
      ${search ? 'No rooms found' : 'No rooms yet. Create one!'}
    </div>`;
    return;
  }

  listEl.innerHTML = '';
  rooms.forEach(([roomId, room]) => {
    const div = document.createElement('div');
    div.className = 'room-item' + (roomId === currentRoomId ? ' active' : '');
    div.dataset.roomId = roomId;

    const lm = roomLastMessages[roomId];
    const unread = unreadCounts[roomId] || 0;
    const timeStr = lm?.time ? formatTime(lm.time) : '';

    div.innerHTML = `
      <div class="room-icon">${getRoomEmoji(room.name)}</div>
      <div class="room-info">
        <div class="room-name">${escapeHtml(room.name)}</div>
        <div class="room-preview">${lm ? escapeHtml(lm.text.substring(0,40)) : 'No messages yet'}</div>
      </div>
      <div class="room-meta">
        <div class="room-time">${timeStr}</div>
        ${unread > 0 ? `<div class="unread-badge">${unread > 99 ? '99+' : unread}</div>` : ''}
      </div>
    `;

    div.addEventListener('click', () => {
      closeSidebar();
      selectRoom(roomId, room.name);
    });

    listEl.appendChild(div);
  });
}

function filterRooms() {
  renderRoomsList();
}

function getRoomEmoji(name) {
  const emojis = ['💬','🗨','📢','🌐','🎮','🎵','📚','💡','🚀','⚡','🔥','✨'];
  let hash = 0;
  for (let c of name) hash = ((hash << 5) - hash) + c.charCodeAt(0);
  return emojis[Math.abs(hash) % emojis.length];
}

function selectRoom(roomId, roomName) {
  if (currentRoomId === roomId) return;

  // Cleanup previous
  if (currentRoomId) {
    db.ref(`messages/${currentRoomId}`).off();
    if (typingListener) db.ref(`typing/${currentRoomId}`).off();
    if (membersListener) db.ref('users').off();
  }

  currentRoomId = roomId;
  currentRoomName = roomName;
  replyingTo = null;
  clearReply();
  isScrolledUp = false;

  // Reset unread
  unreadCounts[roomId] = 0;
  saveUnread();
  renderRoomsList();

  // Update header
  document.getElementById('chat-room-name').textContent = roomName;
  document.getElementById('chat-room-icon').textContent = getRoomEmoji(roomName);

  // Show chat area
  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('chat-area').style.display = 'flex';

  // Clear messages
  document.getElementById('messages-container').innerHTML = '';
  document.getElementById('typing-indicator').innerHTML = '';

  // Listen messages
  listenToMessages(roomId);

  // Listen typing
  listenToTyping(roomId);

  // Listen members
  updateMembersDisplay();

  // Focus input
  document.getElementById('msg-input').focus();
}

// ==================== MESSAGES ====================
function listenToMessages(roomId) {
  let rendered = {};
  let dateGroups = {};
  let isFirstLoad = true;

  db.ref(`messages/${roomId}`).on('value', snap => {
    const messages = snap.val() || {};
    const container = document.getElementById('messages-container');

    // Full re-render
    container.innerHTML = '';
    rendered = {};
    dateGroups = {};

    const msgList = Object.entries(messages).sort((a, b) => a[1].timestamp - b[1].timestamp);

    msgList.forEach(([msgId, msg]) => {
      const dateKey = getDateKey(msg.timestamp);

      if (!dateGroups[dateKey]) {
        dateGroups[dateKey] = true;
        const sep = document.createElement('div');
        sep.className = 'date-separator';
        sep.innerHTML = `<span class="date-label">${dateKey}</span>`;
        container.appendChild(sep);
      }

      const el = createMessageEl(msgId, msg);
      container.appendChild(el);
    });

    // Unread tracking
    if (!isFirstLoad) {
      const newMsgs = Object.entries(messages).filter(([id, m]) =>
        m.senderId !== currentUser.uid && !rendered[id]
      );
      if (newMsgs.length > 0 && isScrolledUp) {
        unreadCounts[roomId] = (unreadCounts[roomId] || 0) + newMsgs.length;
        saveUnread();
        renderRoomsList();
        showNewMsgBtn();
      }
    }
    isFirstLoad = false;

    if (!isScrolledUp) scrollToBottom();
  });
}

function createMessageEl(msgId, msg) {
  const isOwn = msg.senderId === currentUser.uid;
  const wrapper = document.createElement('div');
  wrapper.className = `msg-wrapper ${isOwn ? 'own' : 'other'}`;
  wrapper.dataset.msgId = msgId;

  let html = '';

  // Sender info (for others)
  if (!isOwn && !msg.deleted) {
    html += `
      <div class="msg-sender-info">
        <div class="avatar" style="width:22px;height:22px;font-size:9px;background:${escapeHtml(msg.senderColor || '#9b5de5')};box-shadow:0 0 6px ${escapeHtml(msg.senderColor || '#9b5de5')}">
          ${getInitials(msg.senderName || '?')}
        </div>
        <span class="msg-sender-name" style="color:${escapeHtml(msg.senderColor || '#9b5de5')}">${escapeHtml(msg.senderName || 'Unknown')}</span>
      </div>`;
  }

  // Action bar
  if (!msg.deleted) {
    html += `<div class="msg-actions">
      <button class="action-btn" onclick="showReactionPicker(event,'${msgId}')">😊</button>
      <button class="action-btn" onclick="startReply('${msgId}','${escapeAttr(msg.senderName)}','${escapeAttr(msg.text)}')">↩️ Reply</button>
      ${isOwn ? `<button class="action-btn delete" onclick="deleteMessage('${msgId}')">🗑️ Delete</button>` : ''}
    </div>`;
  }

  // Reply quote
  if (msg.replyTo && !msg.deleted) {
    html += `<div class="reply-quote">
      <div class="reply-quote-name">${escapeHtml(msg.replyTo.senderName)}</div>
      <div class="reply-quote-text">${escapeHtml(msg.replyTo.text)}</div>
    </div>`;
  }

  // Bubble
  if (msg.deleted) {
    html += `<div class="msg-bubble deleted">🚫 This message was deleted</div>`;
  } else {
    html += `<div class="msg-bubble">${formatMsgText(msg.text)}</div>`;
  }

  // Footer (time + tick)
  const timeStr = formatTimestamp(msg.timestamp);
  let tickHtml = '';
  if (isOwn) {
    tickHtml = `<span class="msg-tick seen">✓✓</span>`;
  }
  html += `<div class="msg-footer">
    <span class="msg-time">${timeStr}</span>
    ${tickHtml}
  </div>`;

  // Reactions
  if (msg.reactions && !msg.deleted) {
    const reactMap = {};
    Object.entries(msg.reactions).forEach(([emoji, uids]) => {
      if (uids && Object.keys(uids).length > 0) {
        reactMap[emoji] = Object.keys(uids);
      }
    });

    if (Object.keys(reactMap).length > 0) {
      html += `<div class="msg-reactions">`;
      Object.entries(reactMap).forEach(([emoji, uids]) => {
        const reacted = uids.includes(currentUser.uid);
        html += `<span class="reaction-chip ${reacted ? 'reacted' : ''}"
          onclick="toggleReaction('${msgId}','${emoji}')">
          ${emoji}<span class="reaction-count">${uids.length}</span>
        </span>`;
      });
      html += `</div>`;
    }
  }

  wrapper.innerHTML = html;
  return wrapper;
}

function formatMsgText(text) {
  if (!text) return '';
  return escapeHtml(text).replace(/\n/g, '<br>');
}

// ==================== SEND MESSAGE ====================
function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !currentRoomId) return;

  const msgData = {
    text,
    senderId: currentUser.uid,
    senderName: currentUser.name,
    senderColor: currentUser.color,
    timestamp: firebase.database.ServerValue.TIMESTAMP,
    deleted: false,
    replyTo: replyingTo || null,
    reactions: {}
  };

  db.ref(`messages/${currentRoomId}`).push(msgData)
    .then(() => {
      // Update room last message
      db.ref(`rooms/${currentRoomId}/lastMessage`).set({
        text,
        timestamp: firebase.database.ServerValue.TIMESTAMP,
        senderId: currentUser.uid
      });
    })
    .catch(err => showToast('Failed to send: ' + err.message));

  input.value = '';
  autoResizeTextarea(input);
  clearReply();
  clearTyping();
  scrollToBottom();
}

// ==================== TYPING ====================
function fireTyping() {
  if (!currentRoomId) return;
  db.ref(`typing/${currentRoomId}/${currentUser.uid}`).set(true);
  clearTimeout(typingTimer);
  typingTimer = setTimeout(clearTyping, 3000);
}

function clearTyping() {
  if (!currentRoomId) return;
  db.ref(`typing/${currentRoomId}/${currentUser.uid}`).set(false);
}

function listenToTyping(roomId) {
  db.ref(`typing/${roomId}`).on('value', snap => {
    const typing = snap.val() || {};
    const typers = Object.entries(typing)
      .filter(([uid, val]) => val && uid !== currentUser.uid)
      .map(([uid]) => allUsers[uid]?.name || 'Someone');

    const el = document.getElementById('typing-indicator');
    if (typers.length === 0) {
      el.innerHTML = '';
    } else {
      const names = typers.join(', ');
      el.innerHTML = `
        <span style="color:var(--cyan)">${escapeHtml(names)} ${typers.length === 1 ? 'is' : 'are'} typing</span>
        <div class="typing-dots">
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
          <div class="typing-dot"></div>
        </div>`;
    }
  });
}

// ==================== REACTIONS ====================
function showReactionPicker(event, msgId) {
  event.stopPropagation();
  const picker = document.getElementById('reaction-picker');
  reactionPickerMsgId = msgId;

  picker.innerHTML = '';
  QUICK_REACTIONS.forEach(emoji => {
    const span = document.createElement('span');
    span.className = 'quick-reaction';
    span.textContent = emoji;
    span.addEventListener('click', e => {
      e.stopPropagation();
      toggleReaction(msgId, emoji);
      picker.style.display = 'none';
    });
    picker.appendChild(span);
  });

  picker.style.display = 'flex';
  const rect = event.target.getBoundingClientRect();
  picker.style.left = Math.min(rect.left, window.innerWidth - 300) + 'px';
  picker.style.top = (rect.top - 50) + 'px';
}

function toggleReaction(msgId, emoji) {
  if (!currentRoomId) return;
  const ref = db.ref(`messages/${currentRoomId}/${msgId}/reactions/${emoji}/${currentUser.uid}`);
  ref.once('value').then(snap => {
    if (snap.exists()) {
      ref.remove();
    } else {
      ref.set(true);
    }
  });
}

// ==================== REPLY ====================
function startReply(msgId, senderName, text) {
  replyingTo = { messageId: msgId, senderName, text };
  document.getElementById('reply-preview').style.display = 'flex';
  document.getElementById('reply-preview-name').textContent = '↩️ ' + senderName;
  document.getElementById('reply-preview-text').textContent = text.substring(0, 80);
  document.getElementById('msg-input').focus();
}

function clearReply() {
  replyingTo = null;
  document.getElementById('reply-preview').style.display = 'none';
  document.getElementById('reply-preview-name').textContent = '';
  document.getElementById('reply-preview-text').textContent = '';
}

// ==================== DELETE ====================
function deleteMessage(msgId) {
  if (!currentRoomId) return;
  db.ref(`messages/${currentRoomId}/${msgId}`).update({ deleted: true, text: '' });
}

// ==================== MEMBERS ====================
function listenToAllUsers() {
  db.ref('users').on('value', snap => {
    allUsers = snap.val() || {};
    updateMembersDisplay();
  });
}

function updateMembersDisplay() {
  const onlineCount = Object.values(allUsers).filter(u => u.online).length;
  document.getElementById('chat-room-members').textContent = `${onlineCount} online`;

  const list = document.getElementById('members-list');
  const users = Object.entries(allUsers).sort((a, b) => {
    if (a[1].online && !b[1].online) return -1;
    if (!a[1].online && b[1].online) return 1;
    return (a[1].name || '').localeCompare(b[1].name || '');
  });

  list.innerHTML = '';
  users.forEach(([uid, user]) => {
    const div = document.createElement('div');
    div.className = 'member-item';
    const lastSeen = user.lastSeen ? timeSince(user.lastSeen) : '';
    div.innerHTML = `
      <div class="avatar" style="width:34px;height:34px;font-size:12px;background:${escapeHtml(user.color || '#9b5de5')};box-shadow:0 0 6px ${escapeHtml(user.color || '#9b5de5')}">
        ${getInitials(user.name || '?')}
      </div>
      <div class="member-name">${escapeHtml(user.name || 'Unknown')}${uid === currentUser.uid ? ' <span style="color:var(--purple);font-size:11px">(you)</span>' : ''}</div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
        <div class="member-status-dot ${user.online ? 'online' : 'offline'}"></div>
        ${!user.online && lastSeen ? `<span class="member-status-label">${lastSeen}</span>` : ''}
      </div>`;
    list.appendChild(div);
  });
}

// ==================== SCROLLING ====================
function onMessagesScroll() {
  const wrapper = document.getElementById('messages-wrapper');
  const threshold = 100;
  isScrolledUp = wrapper.scrollHeight - wrapper.scrollTop - wrapper.clientHeight > threshold;

  if (!isScrolledUp) {
    document.getElementById('new-msg-btn').style.display = 'none';
    unreadCounts[currentRoomId] = 0;
    saveUnread();
    renderRoomsList();
  }
}

function scrollToBottom() {
  const wrapper = document.getElementById('messages-wrapper');
  wrapper.scrollTop = wrapper.scrollHeight;
  document.getElementById('new-msg-btn').style.display = 'none';
  isScrolledUp = false;
}

function showNewMsgBtn() {
  document.getElementById('new-msg-btn').style.display = 'block';
}

// ==================== MODALS ====================
function showOnboardingModal(uid) {
  const avatarColors = ['#9b5de5','#00f5d4','#f72585','#4cc9f0','#ff6b6b','#ffd166','#06d6a0','#118ab2'];
  let selectedColor = avatarColors[0];

  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h2>⚡ Welcome to Neon Messenger</h2>
      <p>Set up your profile to get started. Your identity will be saved for future visits.</p>

      <div id="avatar-preview-wrap">
        <div class="avatar" id="avatar-preview" style="background:${selectedColor};box-shadow:0 0 12px ${selectedColor}">?</div>
        <div>
          <div id="avatar-preview-name" style="font-size:15px;font-weight:700">Your Name</div>
          <div id="avatar-preview-sub">Anonymous User</div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Display Name</label>
        <input type="text" id="onboard-name" class="form-input" placeholder="Enter your name..." maxlength="30" autocomplete="off">
      </div>

      <div class="form-group">
        <label class="form-label">Avatar Color</label>
        <div id="color-options">
          ${avatarColors.map((c, i) => `
            <div class="color-option ${i === 0 ? 'selected' : ''}"
              style="background:${c};box-shadow:0 0 8px ${c}"
              data-color="${c}"></div>
          `).join('')}
        </div>
      </div>

      <button class="btn-primary" id="onboard-btn">🚀 Enter the Grid</button>
    </div>`;

  document.body.appendChild(overlay);

  const nameInput = overlay.querySelector('#onboard-name');
  const preview = overlay.querySelector('#avatar-preview');
  const previewName = overlay.querySelector('#avatar-preview-name');

  nameInput.addEventListener('input', () => {
    const val = nameInput.value || 'Your Name';
    preview.textContent = getInitials(val);
    previewName.textContent = val;
  });

  nameInput.focus();

  overlay.querySelectorAll('.color-option').forEach(opt => {
    opt.addEventListener('click', () => {
      overlay.querySelectorAll('.color-option').forEach(o => o.classList.remove('selected'));
      opt.classList.add('selected');
      selectedColor = opt.dataset.color;
      preview.style.background = selectedColor;
      preview.style.boxShadow = `0 0 12px ${selectedColor}`;
    });
  });

  overlay.querySelector('#onboard-btn').addEventListener('click', () => {
    const name = nameInput.value.trim();
    if (!name) {
      nameInput.style.borderColor = '#ff5555';
      nameInput.style.boxShadow = '0 0 8px rgba(255,85,85,0.3)';
      nameInput.focus();
      return;
    }

    localStorage.setItem('nm_name', name);
    localStorage.setItem('nm_color', selectedColor);
    currentUser = { uid, name, color: selectedColor };

    overlay.style.opacity = '0';
    overlay.style.transition = 'opacity 0.3s';
    setTimeout(() => overlay.remove(), 300);

    finishInit();
  });
}

function showNewRoomModal() {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal">
      <h2>💬 Create New Room</h2>
      <p>Give your room a name. Anyone can join and start chatting.</p>
      <div class="form-group">
        <label class="form-label">Room Name</label>
        <input type="text" id="room-name-input" class="form-input" placeholder="e.g. General, Gaming, Music..." maxlength="40" autocomplete="off">
      </div>
      <button class="btn-primary" id="create-room-btn">Create Room</button>
    </div>`;

  document.body.appendChild(overlay);

  const input = overlay.querySelector('#room-name-input');
  input.focus();

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') overlay.querySelector('#create-room-btn').click();
    if (e.key === 'Escape') overlay.remove();
  });

  overlay.querySelector('#create-room-btn').addEventListener('click', () => {
    const name = input.value.trim();
    if (!name) {
      input.style.borderColor = '#ff5555';
      return;
    }

    const newRoomRef = db.ref('rooms').push();
    newRoomRef.set({
      name,
      createdAt: firebase.database.ServerValue.TIMESTAMP,
      createdBy: currentUser.uid
    }).then(() => {
      overlay.remove();
      showToast(`Room "${name}" created!`);
      setTimeout(() => selectRoom(newRoomRef.key, name), 500);
    }).catch(err => {
      showToast('Error: ' + err.message);
    });
  });

  overlay.addEventListener('click', e => {
    if (e.target === overlay) overlay.remove();
  });
}

// ==================== UTILITIES ====================
function getInitials(name) {
  if (!name) return '?';
  const parts = name.trim().split(' ');
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return name.substring(0, 2).toUpperCase();
}

function escapeHtml(text) {
  if (!text) return '';
  return String(text)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

function escapeAttr(text) {
  if (!text) return '';
  return String(text)
    .replace(/'/g, "\\'")
    .replace(/"/g, '\\"')
    .replace(/\n/g, ' ');
}

function formatTimestamp(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
}

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  const oneDay = 86400000;

  if (diff < oneDay && d.getDate() === now.getDate()) {
    return formatTimestamp(ts);
  } else if (diff < 2 * oneDay) {
    return 'Yesterday';
  } else {
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  }
}

function getDateKey(ts) {
  if (!ts) return 'Unknown';
  const d = new Date(ts);
  const now = new Date();
  const diff = (new Date(now.getFullYear(), now.getMonth(), now.getDate())) -
               (new Date(d.getFullYear(), d.getMonth(), d.getDate()));
  const oneDay = 86400000;

  if (diff === 0) return 'Today';
  if (diff === oneDay) return 'Yesterday';
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

function timeSince(ts) {
  if (!ts) return '';
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h / 24)}d ago`;
}

function saveUnread() {
  localStorage.setItem('nm_unread', JSON.stringify(unreadCounts));
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// Cleanup on unload
window.addEventListener('beforeunload', () => {
  if (currentUser) {
    db.ref(`users/${currentUser.uid}`).update({ online: false, lastSeen: Date.now() });
    if (currentRoomId) clearTyping();
  }
});
