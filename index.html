<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>Neon Messenger</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* {
  margin: 0; padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}

:root {
  --bg: #0a0a0f;
  --sidebar: #111118;
  --chat-bg: #0d0d14;
  --purple: #9b5de5;
  --cyan: #00f5d4;
  --purple-dim: rgba(155,93,229,0.18);
  --msg-other: #1a1a2e;
  --text: #e8e8f0;
  --text-dim: #7777aa;
  --border: rgba(155,93,229,0.18);
  --glow: 0 0 12px rgba(155,93,229,0.5);
  --error: #ff5555;
  --success: #00e676;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
}

html, body {
  height: 100%;
  height: -webkit-fill-available;
  overflow: hidden;
  background: var(--bg);
  font-family: 'Inter', sans-serif;
  color: var(--text);
  overscroll-behavior: none;
}

/* Scrollbar */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 2px; }

/* ═══════════════════════════════
   APP SHELL
═══════════════════════════════ */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: -webkit-fill-available;
  position: relative;
  overflow: hidden;
}

/* ═══════════════════════════════
   LOADER
═══════════════════════════════ */
#loader {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  z-index: 9999;
  padding: 20px;
  transition: opacity 0.4s ease;
}

.loader-icon {
  width: 80px;
  height: 80px;
  background: linear-gradient(135deg, var(--purple), var(--cyan));
  border-radius: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  animation: loaderPulse 1.6s ease infinite;
  box-shadow: 0 0 40px rgba(155,93,229,0.5);
}

@keyframes loaderPulse {
  0%,100% { transform: scale(1); box-shadow: 0 0 30px rgba(155,93,229,0.4); }
  50% { transform: scale(1.06); box-shadow: 0 0 60px rgba(155,93,229,0.7); }
}

.loader-title {
  font-size: 26px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--purple), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.loader-bar-wrap {
  width: 200px;
  height: 4px;
  background: rgba(155,93,229,0.15);
  border-radius: 2px;
  overflow: hidden;
}

.loader-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--purple), var(--cyan));
  border-radius: 2px;
  width: 0%;
  transition: width 0.4s ease;
  box-shadow: 0 0 8px var(--purple);
}

#loader-msg {
  font-size: 13px;
  color: var(--text-dim);
  text-align: center;
  max-width: 280px;
  line-height: 1.6;
  min-height: 42px;
}

#loader-msg.err { color: var(--error); }
#loader-msg.ok { color: var(--success); }

#retry-btn {
  display: none;
  background: linear-gradient(135deg, var(--purple), #7b3fd4);
  border: none;
  border-radius: 14px;
  padding: 14px 32px;
  color: #fff;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(155,93,229,0.4);
  -webkit-appearance: none;
}

/* ═══════════════════════════════
   SCREENS (mobile stack)
═══════════════════════════════ */
.screen {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  transition: transform 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.32s ease;
  will-change: transform;
}

.screen.hidden {
  transform: translateX(100%);
  opacity: 0;
  pointer-events: none;
}

.screen.slide-left {
  transform: translateX(-30%);
  opacity: 0.6;
  pointer-events: none;
}

/* ═══════════════════════════════
   ROOMS SCREEN
═══════════════════════════════ */
#rooms-screen {
  z-index: 1;
}

.top-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  padding-top: calc(12px + var(--safe-top));
  background: var(--sidebar);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  min-height: 60px;
}

.top-bar-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  flex: 1;
}

.logo-icon {
  width: 36px;
  height: 36px;
  background: linear-gradient(135deg, var(--purple), var(--cyan));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  box-shadow: 0 0 10px rgba(155,93,229,0.4);
  flex-shrink: 0;
}

.logo-name {
  font-size: 17px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--purple), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

#my-avatar-btn {
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
  flex-shrink: 0;
  position: relative;
}

.my-av {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 800;
  color: #fff;
  text-transform: uppercase;
}

.online-ring {
  position: absolute;
  bottom: 0;
  right: 0;
  width: 11px;
  height: 11px;
  background: var(--success);
  border: 2px solid var(--sidebar);
  border-radius: 50%;
  box-shadow: 0 0 6px var(--success);
}

/* Search */
#search-wrap {
  padding: 10px 14px;
  background: var(--sidebar);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#search-in {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 10px 18px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  outline: none;
  -webkit-appearance: none;
}

#search-in::placeholder { color: var(--text-dim); }
#search-in:focus { border-color: var(--purple); box-shadow: 0 0 10px rgba(155,93,229,0.2); }

/* Rooms list */
#rooms-list {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

.room-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  cursor: pointer;
  transition: background 0.15s;
  -webkit-user-select: none;
  user-select: none;
  active: background rgba(155,93,229,0.1);
}

.room-row:active { background: rgba(155,93,229,0.08); }

.room-av {
  width: 52px;
  height: 52px;
  border-radius: 16px;
  background: linear-gradient(135deg, rgba(155,93,229,0.3), rgba(0,245,212,0.2));
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  flex-shrink: 0;
}

.room-info { flex: 1; min-width: 0; }

.room-name-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
  gap: 8px;
}

.room-n {
  font-size: 15px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex: 1;
}

.room-t { font-size: 11px; color: var(--text-dim); flex-shrink: 0; }

.room-prev {
  font-size: 13px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.unread-dot {
  background: var(--purple);
  color: #fff;
  border-radius: 10px;
  padding: 2px 7px;
  font-size: 11px;
  font-weight: 700;
  min-width: 20px;
  text-align: center;
  box-shadow: 0 0 8px rgba(155,93,229,0.5);
  flex-shrink: 0;
}

.empty-list {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  padding: 60px 30px;
  color: var(--text-dim);
  font-size: 14px;
  text-align: center;
  line-height: 1.7;
}

/* FAB */
#fab {
  position: absolute;
  bottom: calc(24px + var(--safe-bottom));
  right: 20px;
  width: 58px;
  height: 58px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--purple), #7b3fd4);
  border: none;
  color: #fff;
  font-size: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 6px 28px rgba(155,93,229,0.5), var(--glow);
  cursor: pointer;
  z-index: 10;
  transition: transform 0.15s, box-shadow 0.15s;
  -webkit-appearance: none;
}

#fab:active { transform: scale(0.92); }

/* ═══════════════════════════════
   CHAT SCREEN
═══════════════════════════════ */
#chat-screen {
  z-index: 2;
  transform: translateX(100%);
  opacity: 0;
  pointer-events: none;
}

#chat-screen.active {
  transform: translateX(0);
  opacity: 1;
  pointer-events: all;
}

/* Chat top bar */
#chat-topbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  padding-top: calc(10px + var(--safe-top));
  background: var(--sidebar);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  min-height: 60px;
}

#back-btn {
  background: none;
  border: none;
  color: var(--purple);
  font-size: 24px;
  cursor: pointer;
  padding: 4px 8px 4px 2px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  line-height: 1;
}

#chat-av {
  width: 38px;
  height: 38px;
  border-radius: 12px;
  background: linear-gradient(135deg, rgba(155,93,229,0.4), rgba(0,245,212,0.3));
  border: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

#chat-info { flex: 1; min-width: 0; }

#chat-room-name {
  font-size: 15px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

#chat-online {
  font-size: 12px;
  color: var(--cyan);
  font-weight: 500;
}

#members-btn-chat {
  background: rgba(155,93,229,0.12);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 10px;
  color: var(--text);
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  line-height: 1;
}

/* Messages area */
#msgs-wrap {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  background: var(--chat-bg);
  position: relative;
  background-image:
    radial-gradient(ellipse at 15% 50%, rgba(155,93,229,0.04) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 20%, rgba(0,245,212,0.03) 0%, transparent 55%);
}

#msgs-container {
  padding: 12px 12px 8px;
  display: flex;
  flex-direction: column;
  gap: 1px;
  min-height: 100%;
}

.date-sep {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 12px 0 8px;
  color: var(--text-dim);
  font-size: 11px;
}

.date-sep::before, .date-sep::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.date-pill {
  background: rgba(155,93,229,0.1);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 3px 12px;
  white-space: nowrap;
}

/* Message bubbles */
.msg-wrap {
  display: flex;
  flex-direction: column;
  max-width: 82%;
  margin: 2px 0;
  position: relative;
}

.msg-wrap.own { align-self: flex-end; }
.msg-wrap.other { align-self: flex-start; }

.msg-sender-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 3px;
}

.msg-mini-av {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 8px;
  font-weight: 800;
  color: #fff;
  flex-shrink: 0;
}

.msg-sender-name {
  font-size: 11px;
  font-weight: 700;
}

.bubble {
  padding: 9px 13px;
  border-radius: 18px;
  font-size: 14px;
  line-height: 1.55;
  word-break: break-word;
  white-space: pre-wrap;
  position: relative;
}

.msg-wrap.own .bubble {
  background: var(--purple-dim);
  border: 1px solid rgba(155,93,229,0.35);
  border-left: 3px solid var(--purple);
  border-radius: 18px 4px 18px 18px;
}

.msg-wrap.other .bubble {
  background: var(--msg-other);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 4px 18px 18px 18px;
}

.bubble.deleted {
  opacity: 0.5;
  font-style: italic;
  color: var(--text-dim);
  font-size: 13px;
  border-style: dashed !important;
}

.reply-block {
  background: rgba(255,255,255,0.05);
  border-left: 3px solid var(--cyan);
  border-radius: 8px;
  padding: 6px 10px;
  margin-bottom: 6px;
  font-size: 12px;
}

.reply-name { color: var(--cyan); font-weight: 700; font-size: 11px; margin-bottom: 2px; }
.reply-txt { color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.msg-foot {
  display: flex;
  align-items: center;
  gap: 4px;
  margin-top: 4px;
  justify-content: flex-end;
}

.msg-time { font-size: 10px; color: var(--text-dim); }
.msg-tick { font-size: 12px; color: var(--cyan); }

.reactions-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 5px;
}

.react-chip {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 3px 8px;
  font-size: 13px;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 3px;
  -webkit-user-select: none;
  user-select: none;
  transition: background 0.15s;
}

.react-chip:active { background: rgba(155,93,229,0.25); }
.react-chip.mine { background: rgba(155,93,229,0.22); border-color: rgba(155,93,229,0.5); }
.react-cnt { font-size: 11px; color: var(--text-dim); font-weight: 600; }

/* Long-press action sheet */
#msg-actions-sheet {
  position: fixed;
  inset: 0;
  z-index: 500;
  display: none;
}

#msg-actions-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

#msg-actions-box {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: #16162a;
  border-radius: 24px 24px 0 0;
  border-top: 1px solid var(--border);
  padding-bottom: var(--safe-bottom);
  animation: sheetUp 0.25s cubic-bezier(0.4,0,0.2,1);
}

@keyframes sheetUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.sheet-handle {
  width: 40px;
  height: 4px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
  margin: 12px auto 8px;
}

.sheet-msg-preview {
  margin: 0 16px 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
  font-size: 13px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.react-row {
  display: flex;
  justify-content: space-around;
  padding: 8px 20px 14px;
  border-bottom: 1px solid var(--border);
}

.quick-em {
  font-size: 28px;
  cursor: pointer;
  padding: 6px;
  border-radius: 12px;
  transition: transform 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}

.quick-em:active { transform: scale(1.3); }

.sheet-actions { padding: 8px 0 8px; }

.sheet-action {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 15px 20px;
  cursor: pointer;
  font-size: 15px;
  font-weight: 500;
  transition: background 0.15s;
  -webkit-user-select: none;
  user-select: none;
}

.sheet-action:active { background: rgba(255,255,255,0.05); }
.sheet-action-icon { font-size: 20px; width: 28px; text-align: center; }
.sheet-action.danger { color: var(--error); }

/* New messages button */
#new-msgs-btn {
  position: absolute;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--purple);
  color: #fff;
  border: none;
  border-radius: 20px;
  padding: 9px 18px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  display: none;
  box-shadow: var(--glow);
  z-index: 5;
  white-space: nowrap;
}

/* Typing indicator */
#typing-bar {
  min-height: 24px;
  padding: 2px 16px 2px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--cyan);
  font-weight: 500;
  flex-shrink: 0;
  background: var(--chat-bg);
}

.typing-dots { display: flex; gap: 3px; align-items: center; }
.tdot {
  width: 5px; height: 5px;
  background: var(--cyan);
  border-radius: 50%;
  animation: tdot 1.2s infinite;
}
.tdot:nth-child(2) { animation-delay: 0.2s; }
.tdot:nth-child(3) { animation-delay: 0.4s; }

@keyframes tdot {
  0%,60%,100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-5px); opacity: 1; }
}

/* Input area */
#input-area {
  background: var(--sidebar);
  border-top: 1px solid var(--border);
  padding: 8px 12px;
  padding-bottom: calc(8px + var(--safe-bottom));
  flex-shrink: 0;
}

#reply-strip {
  display: none;
  align-items: center;
  gap: 10px;
  background: rgba(0,245,212,0.07);
  border: 1px solid rgba(0,245,212,0.2);
  border-radius: 10px;
  padding: 7px 12px;
  margin-bottom: 8px;
}

#reply-strip-content { flex: 1; min-width: 0; }
#reply-strip-name { font-size: 11px; color: var(--cyan); font-weight: 700; margin-bottom: 2px; }
#reply-strip-text { font-size: 12px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

#reply-strip-x {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 18px;
  cursor: pointer;
  flex-shrink: 0;
  padding: 2px 4px;
  line-height: 1;
}

#input-row {
  display: flex;
  align-items: flex-end;
  gap: 8px;
}

#emoji-toggle {
  background: none;
  border: none;
  font-size: 26px;
  cursor: pointer;
  flex-shrink: 0;
  padding: 4px;
  line-height: 1;
  display: flex;
  align-items: center;
}

#msg-in {
  flex: 1;
  background: rgba(255,255,255,0.07);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 10px 16px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  outline: none;
  resize: none;
  line-height: 1.45;
  min-height: 44px;
  max-height: 120px;
  overflow-y: auto;
  -webkit-appearance: none;
  transition: border-color 0.2s;
}

#msg-in:focus { border-color: var(--purple); }
#msg-in::placeholder { color: var(--text-dim); }

#send-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--purple), #7b3fd4);
  border: none;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  box-shadow: 0 3px 14px rgba(155,93,229,0.4);
  transition: transform 0.15s;
  -webkit-appearance: none;
}

#send-btn:active { transform: scale(0.92); }

/* ═══════════════════════════════
   EMOJI PANEL (slides up)
═══════════════════════════════ */
#emoji-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #15152a;
  border-top: 1px solid var(--border);
  border-radius: 22px 22px 0 0;
  z-index: 200;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  padding-bottom: var(--safe-bottom);
  max-height: 52vh;
  display: flex;
  flex-direction: column;
}

#emoji-panel.open { transform: translateY(0); }

.ep-handle {
  width: 40px;
  height: 4px;
  background: rgba(255,255,255,0.12);
  border-radius: 2px;
  margin: 10px auto 6px;
  flex-shrink: 0;
}

#ep-tabs {
  display: flex;
  gap: 2px;
  padding: 0 10px 4px;
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  flex-shrink: 0;
}
#ep-tabs::-webkit-scrollbar { height: 0; }

.ep-tab {
  background: none;
  border: none;
  font-size: 22px;
  padding: 6px 10px;
  cursor: pointer;
  border-radius: 10px;
  border-bottom: 2px solid transparent;
  flex-shrink: 0;
  transition: background 0.15s;
}

.ep-tab.active {
  border-bottom-color: var(--purple);
  background: rgba(155,93,229,0.12);
}

#ep-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 0;
  padding: 8px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  flex: 1;
}

@media (max-width: 360px) {
  #ep-grid { grid-template-columns: repeat(7, 1fr); }
}
